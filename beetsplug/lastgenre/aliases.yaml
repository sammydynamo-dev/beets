# Ampersands / Delimiters
drum and bass:
    - d(rum)?[ &n/]*b(ass)?
rhythm and blues:
    - r(hythm)?[ &n/]*b(lues)?
rock and roll:
    - rock[ '‐&n/ \-]*roll

# Hyphenation: k-pop, j-rock, post-rock, lo-fi, p-funk, synthpop, avant-garde
\g<1>-\g<2>:
    - (c|k|j) *(folk|goth|pop|rock|ska|trance)
post-\g<1>:
    - post +(\w+)
lo-fi:
    - (g?lo) *fi
\g<1>-funk:
    - (p|g) *funk
synth\g<1>:
    - synth[ -]+(\w+)
avant-garde:
    - avant *(gard(e)?)?
    - avant-gard
    - avant

# Nu- spellings: nu-disco -> nu disco, nu-jazz -> nu jazz
nu \g<1>:
    - nu[ -]*(disco|jazz|metal|soul)

# Terminology / Synonyms
electronic:
    - electronic music
world music:
    - world
chillout:
    - chill([ -]*out)?
darkwave:
    - dark[ -]*wave
downtempo:
    - down[ -]*beat
shoegaze:
    - shoegaze?r?
    - shoegazing

# Spacing: hip hop, trip hop, etc.
\g<1> hop:
    - (glitch|hip|jazz|trip)y?([ -]*hip)?[ -]*hop

# Compound genres
blues rock:
    - blues[ -]*rock
folk rock:
    - folk[ -]*rock
alternative rock:
    - alt([ -]*rock)?
    - alternative([ -]*rock)?
indie rock:
    - indie([ -]*rock)?
# negative lookahead avoids matching 'gothic metal'
gothic rock:
    - goth(?!ic)([ -]*rock)?
    - gothic[ -]*rock
# avoids matching 'progressive metal'
progressive rock:
    - prog([ -]*rock)?
    - progressive[ -]*rock
# avoids matching 'trad jazz' or 'traditional country'
traditional folk:
    - trad(/|ition(/|al)?)?-?
